name: Build and upload to PyPI

on: [push]

jobs:
  build_wheels:
    name: Build ${{ matrix.archs }} ${{ matrix.build }} wheels on ${{ matrix.os }}
    runs-on: "${{ matrix.os }}${{ (startsWith(matrix.archs, 'aarch64') || startsWith(matrix.archs, 'armv7l')) && '-arm' || '' }}"
    strategy:
      matrix:
        os: [ubuntu-24.04]
        archs: ["x86_64, i686", "aarch64", "ppc64le", "s390x", "riscv64", "armv7l"]
        build: ["manylinux", "musllinux"]
        platform: ["auto"]
        include:
          - os: windows-2022
            archs: "AMD64"
          - os: windows-2022
            archs: "x86"
          - os: windows-11-arm
            archs: "ARM64"
          - os: macos-15-intel
            archs: "x86_64"
          - os: macos-14
            archs: "arm64"
          - os: ubuntu-24.04
            archs: "wasm32"
            platform: "pyodide"
          - os: ubuntu-24.04
            archs: "arm64_v8a, x86_64"
            platform: "android"
          - os: macos-14
            archs: "arm64_iphoneos,arm64_iphonesimulator"
            platform: "ios"
          - os: macos-15-intel
            archs: "x86_64_iphonesimulator"
            platform: "ios"

    steps:
      - name: Disable git autocrlf
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        if: runner.os == 'Linux'

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS: "${{ matrix.archs }}"
          CIBW_BUILD: "${{ matrix.build && '*-' || ''}}${{ matrix.build }}*"
          CIBW_PLATFORM: "${{ matrix.platform }}"
          CIBW_PRERELEASE_PYTHONS: "${{ !startsWith(github.ref, 'refs/tags/v') }}"

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.build }}-${{ matrix.archs }}
          path: ./wheelhouse/*.whl


  build_sdist:
    name: Build sdist
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ['3.10']
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -U pip 'setuptools>=45'

      - name: Build sdist
        run: python setup.py build sdist

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-dist
          path: dist/*.tar.gz


  upload_test_pypi:
    name: Upload to Test PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.repository == 'ifduyue/xxtea' && !startsWith(github.ref, 'refs/tags/v')
    environment:
      name: test-pypi
      url: https://test.pypi.org/project/xxtea/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Upload to Test PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true
          repository-url: https://test.pypi.org/legacy/

  upload_pypi:
    name: Upload to PyPI (${{ matrix.group }})
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.repository == 'ifduyue/xxtea' && startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        group:
          - 1-of-3
          - 2-of-3
          - 3-of-3
    environment:
      name: pypi
      url: https://pypi.org/project/xxtea/
    permissions:
      contents: write
      id-token: write
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v7
        if: ${{ strategy.job-index == 0 }}
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Select this group's distributions
        id: group
        run: |
          set -euo pipefail
          index=$(( $(echo "${{ matrix.group }}" | cut -d- -f1) - 1 ))
          count=$(echo "${{ matrix.group }}" | cut -d- -f3)
          mkdir -p dist_group
          shopt -s nullglob
          mapfile -t all < <(printf '%s\n' dist/*.whl dist/*.tar.gz | LC_ALL=C sort)
          i=0
          for f in "${all[@]}"; do
            if [ "$(( i % count ))" -eq "${index}" ]; then
              mv -- "$f" dist_group/
            fi
            i=$(( i + 1 ))
          done
          echo "Group ${index} of ${count}: ${#all[@]} dists total, kept $(ls dist_group | wc -l) dist(s)"

      - name: Check whether the GitHub Release already exists
        if: ${{ strategy.job-index == 0 }}
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
              --silent 2>err; then
            echo 'exists=true' >> "${GITHUB_OUTPUT}"
          elif grep -q 'HTTP 404' err; then
            echo 'exists=false' >> "${GITHUB_OUTPUT}"
          else
            cat err >&2
            exit 1
          fi

      - name: Create GitHub Release
        if: ${{ strategy.job-index == 0 && steps.check-release.outputs.exists != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 << 'EOF' > release_notes.md
        import os, re
        tag = os.environ['TAG']
        repo = os.environ['REPO']
        with open('CHANGELOG.rst') as f:
            text = f.read()
        # Find all version headings
        versions = re.findall(r'^(v[\d.]+) [\d/]+$', text, re.MULTILINE)
        # Find current version's section
        escaped = re.escape(tag)
        pattern = r'^' + escaped + r'.*?(?=^v[\d.]+ [\d/]+|\Z)'
        m = re.search(pattern, text, re.MULTILINE | re.DOTALL)
        if m:
            notes = m.group(0).strip()
        else:
            notes = 'Release ' + tag
        # Find previous version in the same major.minor series
        prefix = tag.rsplit('.', 1)[0]
        prev = ''
        for v in versions:
            if v == tag:
                break
            if v.startswith(prefix):
                prev = v
        if prev:
            notes += '\n\n**Full Changelog**: https://github.com/' + repo + '/compare/' + prev + '...' + tag
        with open('release_notes.md', 'w') as f:
            f.write(notes + '\n')
        EOF
          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TAG}" \
            --notes-file release_notes.md

      - name: Wait for the GitHub Release
        if: ${{ strategy.job-index != 0 }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 150); do
            if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
                --silent 2>err; then
              exit 0
            fi
            if ! grep -q 'HTTP 404' err; then
              cat err >&2
              exit 1
            fi
            sleep 2
          done
          echo "GitHub Release ${TAG} did not appear in time" >&2
          exit 1

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist_group
          skip-existing: true

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v3.0.2
        with:
          files: dist_group/*
